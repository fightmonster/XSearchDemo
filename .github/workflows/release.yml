name: Release APK

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0, v1.2.3
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEY_ALIAS:       ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD:    ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD:  ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version name from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK with version
        run: |
          VERSION=${{ steps.version.outputs.name }}
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/XSearchDemo-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: XSearchDemo ${{ steps.version.outputs.name }}
          body: |
            ## XSearchDemo ${{ steps.version.outputs.name }}

            Universal search for Android 14+ — search contacts, media files, documents & installed apps.

            ### 安装说明
            下载 APK 并在 Android 14+ 设备上安装。

            ### 权限说明
            - `READ_CONTACTS` — 搜索联系人
            - `READ_MEDIA_IMAGES / VIDEO / AUDIO` — 搜索图片、视频、音频
            - Documents 文件夹搜索通过 SAF 授权，无需额外权限
          files: app/build/outputs/apk/release/XSearchDemo-${{ steps.version.outputs.name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
